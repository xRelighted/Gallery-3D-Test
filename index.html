<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papulines Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background particles -->
  <canvas id="bg-canvas"></canvas>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-mark">PG</div>
      <h1 class="site-title">Papulines<em>Gallery</em></h1>
      <div class="header-meta">
      </div>
    </div>
    <p class="hint-text">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0m0 0V5a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v16a6 6 0 0 0 6 6h2a6 6 0 0 0 6-6v-5"/></svg>
      Arrastrá las imágenes · Girar con scroll
    </p>
  </header>

  <!-- 3D Carousel Stage -->
  <main class="stage">
    <div class="carousel" id="carousel">

      <div class="card" data-index="0">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img1.jpg" alt="Obra 1" draggable="false">
            <div class="card-overlay">
              <span class="card-num">01</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="1">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img2.jpg" alt="Obra 2" draggable="false">
            <div class="card-overlay">
              <span class="card-num">02</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="2">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img3.jpg" alt="Obra 3" draggable="false">
            <div class="card-overlay">
              <span class="card-num">03</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="3">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img4.jpg" alt="Obra 4" draggable="false">
            <div class="card-overlay">
              <span class="card-num">04</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="4">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img5.jpg" alt="Obra 5" draggable="false">
            <div class="card-overlay">
              <span class="card-num">05</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="5">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img6.jpg" alt="Obra 6" draggable="false">
            <div class="card-overlay">
              <span class="card-num">06</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="6">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img7.jpg" alt="Obra 7" draggable="false">
            <div class="card-overlay">
              <span class="card-num">07</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="7">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img8.jpg" alt="Obra 8" draggable="false">
            <div class="card-overlay">
              <span class="card-num">08</span>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Ground reflection plane -->
    <div class="ground-plane"></div>
  </main>

  <!-- Floating card (drag target) -->
  <div class="floating-card" id="floatingCard">
    <div class="floating-card-bg"></div>
    <img id="floatingImg" src="" alt="" draggable="false">
    <div class="floating-close" id="floatingClose">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <div class="floating-index"></div>
  </div>

  <!-- GitHub link -->
  <a class="github-link" href="https://github.com/xRelighted" target="_blank" rel="noreferrer noopener" aria-label="GitHub de xRelighted">
    <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
    </svg>
    <span>xRelighted</span>
  </a>

  <!-- Cursor custom -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <script src="script.js"></script>
</body>
</html>
