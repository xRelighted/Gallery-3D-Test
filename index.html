<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Papulines Gallery - Una experiencia visual interactiva 3D con carrusel de obras de arte.">
  <meta name="theme-color" content="#080808">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Papulines Gallery">
  <title>Papulines Gallery - Galería de Arte 3D Interactiva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body role="application" aria-label="Papulines Gallery - Carrusel 3D interactivo">

  <!-- Ambient background particles -->
  <canvas id="bg-canvas"></canvas>

  <!-- Header -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <div class="logo-mark" aria-label="PG logo">PG</div>
      <h1 class="site-title">Papulines<em>Gallery</em></h1>
      <div class="header-meta" aria-label="Información adicional">
      </div>
    </div>
    <p class="hint-text" aria-live="polite">
    </p>
  </header>

  <!-- 3D Carousel Stage -->
  <main class="stage" role="region" aria-label="Carrusel 3D de obras de arte">
    <div class="carousel" id="carousel" role="listbox" aria-label="Galería de obras" aria-live="polite">

      <div class="card" data-index="0" role="option" tabindex="0" aria-label="Obra 1 de 8">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img1.jpg" alt="Obra 1" draggable="false" loading="lazy">
            <div class="card-overlay">
              <span class="card-num" aria-hidden="true">01</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="1" role="option" tabindex="0" aria-label="Obra 2 de 8">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img2.jpg" alt="Obra 2" draggable="false" loading="lazy">
            <div class="card-overlay">
              <span class="card-num" aria-hidden="true">02</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="2" role="option" tabindex="0" aria-label="Obra 3 de 8">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img3.jpg" alt="Obra 3" draggable="false" loading="lazy">
            <div class="card-overlay">
              <span class="card-num" aria-hidden="true">03</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="3" role="option" tabindex="0" aria-label="Obra 4 de 8">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img4.jpg" alt="Obra 4" draggable="false" loading="lazy">
            <div class="card-overlay">
              <span class="card-num" aria-hidden="true">04</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="4" role="option" tabindex="0" aria-label="Obra 5 de 8">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img5.jpg" alt="Obra 5" draggable="false" loading="lazy">
            <div class="card-overlay">
              <span class="card-num" aria-hidden="true">05</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="5" role="option" tabindex="0" aria-label="Obra 6 de 8">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img6.jpg" alt="Obra 6" draggable="false" loading="lazy">
            <div class="card-overlay">
              <span class="card-num" aria-hidden="true">06</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="6" role="option" tabindex="0" aria-label="Obra 7 de 8">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img7.jpg" alt="Obra 7" draggable="false" loading="lazy">
            <div class="card-overlay">
              <span class="card-num" aria-hidden="true">07</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" data-index="7" role="option" tabindex="0" aria-label="Obra 8 de 8">
        <div class="card-inner">
          <div class="card-face card-front">
            <img src="assets/img8.jpg" alt="Obra 8" draggable="false" loading="lazy">
            <div class="card-overlay">
              <span class="card-num" aria-hidden="true">08</span>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Ground reflection plane -->
    <div class="ground-plane"></div>
  </main>

  <!-- Floating card (drag target) -->
  <div class="floating-card" id="floatingCard" role="dialog" aria-label="Vista ampliada de obra de arte" hidden>
    <div class="floating-card-bg"></div>
    <img id="floatingImg" src="" alt="Obra de arte ampliada" draggable="false">
    <button class="floating-close" id="floatingClose" aria-label="Cerrar vista ampliada" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="floating-index" aria-live="polite"></div>
  </div>

  <!-- GitHub link -->
  <a class="github-link" href="https://github.com/xRelighted" target="_blank" rel="noreferrer noopener" aria-label="Perfil de GitHub de xRelighted (se abre en nueva ventana)">
    <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
    </svg>
    <span>GitHub</span>
  </a>

  <!-- Portfolio link -->
  <a class="portfolio-link" href="https://relighted.vercel.app" target="_blank" rel="noreferrer noopener" aria-label="Portafolio web de xRelighted (se abre en nueva ventana)">
    <img class="portfolio-icon" src="https://i.imgur.com/pvvtE36.png" alt="Portafolio" width="24" height="24">
    <span>Portafolio</span>
  </a>

  <!-- Cursor custom -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <script src="script.js"></script>
</body>
</html>
